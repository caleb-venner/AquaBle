name: Build Home Assistant Add-on

on:
  push:
    branches:
      - main
    tags:
      - 'v*'
  pull_request:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    name: Build add-on
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Prepare add-on build context
        run: scripts/prepare_addon_context.sh

      - name: Debug add-on build context
        run: |
          echo "Repository root contents:" && ls -a
          echo "aquable directory contents:" && ls -a aquable
          echo "aquable/build directory contents (top level):" && ls -a aquable/build

      - name: Get version from tag
        id: version
        run: |
          if [[ $GITHUB_REF == refs/tags/v* ]]; then
            echo "version=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT
          else
            echo "version=dev" >> $GITHUB_OUTPUT
          fi

      - name: Login to GitHub Container Registry
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push add-on
        uses: home-assistant/builder@master
        with:
          args: |
            --all \
            --target aquable \
            --docker-hub ghcr.io/${{ github.repository_owner }} \
            --no-latest
        env:
          DOCKER_BUILDKIT: 1
