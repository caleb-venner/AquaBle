name: Release to Main Branch

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write
  packages: write

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Extract version from tag
        id: version
        run: echo "version=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Build frontend
        run: |
          cd frontend
          npm ci
          npm run build

      - name: Prepare build context
        run: |
          mkdir -p aquable/frontend
          cp -r frontend/dist aquable/frontend/
          cp -r src aquable/
          cp pyproject.toml aquable/
          cp build.yaml aquable/
          cp config.yaml aquable/
          cp Dockerfile aquable/
          cp -r rootfs aquable/

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push multi-arch images
        run: |
          docker run --rm --privileged \
            -v /var/run/docker.sock:/var/run/docker.sock:ro \
            -v ~/.docker:/root/.docker \
            -v ${{ github.workspace }}:/data \
            ghcr.io/home-assistant/amd64-builder:latest \
            --target /data/aquable \
            --docker-hub ghcr.io/${{ github.repository_owner }} \
            --amd64 --aarch64 \
            --version ${{ steps.version.outputs.version }}

  sync-to-main:
    needs: build-and-push
    runs-on: ubuntu-latest
    steps:
      - name: Checkout source tag
        uses: actions/checkout@v4
        with:
          path: source

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Build frontend
        run: |
          cd source/frontend
          npm ci
          npm run build

      - name: Checkout main branch
        uses: actions/checkout@v4
        with:
          path: main
          token: ${{ secrets.GITHUB_TOKEN }}
          ref: main

      - name: Sync files to main branch
        run: |
          rm -rf main/aquable
          mkdir -p main/aquable
          cp -r source/aquable/* main/aquable/
          
          mkdir -p main/aquable/frontend
          cp -r source/frontend/dist main/aquable/frontend/
          
          cp -r source/src main/aquable/
          cp source/build.yaml main/aquable/
          cp source/config.yaml main/aquable/
          cp source/Dockerfile main/aquable/
          cp -r source/rootfs main/aquable/

      - name: Commit and push to main branch
        run: |
          cd main
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          git add .
          git commit -m "Release ${{ github.ref_name }}" || echo "No changes to commit"
          git push origin main
