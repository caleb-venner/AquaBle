name: Release to Main Branch

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    env:
      COSIGN_VERSION: v2.6.0
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Extract version from tag
        id: version
        run: echo "version=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Build frontend
        run: |
          cd frontend
          npm ci
          npm run build

      - name: Prepare build context
        run: |
          mkdir -p aquable/frontend
          cp -r frontend/dist aquable/frontend/
          cp -r src aquable/
          cp pyproject.toml aquable/

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Install cosign
        uses: sigstore/cosign-installer@v3
        with:
          cosign-release: 'v2.6.0'

      - name: Build and push multi-arch images
        uses: home-assistant/builder@master
        with:
          args: |
            --target aquable \
            --docker-hub ghcr.io/${{ github.repository_owner }} \
            --amd64 --aarch64 \
            --version ${{ steps.version.outputs.version }}

  sync-to-main:
    needs: build-and-push
    runs-on: ubuntu-latest
    steps:
      - name: Checkout source tag
        uses: actions/checkout@v4
        with:
          path: source

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Build frontend
        run: |
          cd source/frontend
          npm ci
          npm run build

      - name: Checkout main branch
        uses: actions/checkout@v4
        with:
          path: main
          token: ${{ secrets.GITHUB_TOKEN }}
          ref: main

      - name: Sync files to main branch
        run: |
          # Selectively sync only the add-on files we maintain from the source tag
          # This preserves any main-branch-specific files (docs, configs, etc.)
          
          # Copy add-on structure (remove old aquable/ dir first to clean stale files)
          rm -rf main/aquable
          mkdir -p main/aquable
          cp -r source/aquable/* main/aquable/
          
          # Copy built frontend to add-on directory
          mkdir -p main/aquable/frontend
          cp -r source/frontend/dist main/aquable/frontend/
          
          # Copy source code to add-on directory (needed for Dockerfile build context)
          cp -r source/src main/aquable/

      - name: Commit and push to main branch
        run: |
          cd main
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          git add .
          git commit -m "Release ${{ github.ref_name }}" || echo "No changes to commit"
          git push origin main
