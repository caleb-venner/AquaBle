name: Build and Release Legacy Add-on

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write
  packages: write

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Extract version from tag
        id: version
        run: echo "version=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Update versions from tag
        run: python3 scripts/update_version.py "${{ steps.version.outputs.version }}"

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Build frontend
        run: |
          cd frontend
          npm ci
          npm run build

      - name: Prepare build context
        run: |
          mkdir -p aquable/frontend
          cp -r frontend/dist aquable/frontend/
          cp -r src aquable/
          cp pyproject.toml aquable/

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GHCR_PAT }}

      - name: Build and push multi-arch images
        run: |
          docker run --rm --privileged \
            -v /var/run/docker.sock:/var/run/docker.sock:ro \
            -v ~/.docker:/root/.docker \
            -v ${{ github.workspace }}:/data \
            ghcr.io/home-assistant/amd64-builder:latest \
            --target /data/aquable \
            --docker-hub ghcr.io/${{ github.repository_owner }} \
            --amd64 --aarch64 \
            --version ${{ steps.version.outputs.version }}
