---
# yamllint disable rule:truthy
name: Build and Deploy

on:
  push:
    branches: [main, develop]
    tags: ['v*']
  pull_request:
    branches: [main]

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  # Frontend build (shared by all deployments)
  frontend:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Install Dependencies (workaround for npm optional deps bug)
        run: |
          rm -rf node_modules package-lock.json
          npm install
          git checkout package-lock.json

      - name: Build frontend
        run: npm run build

      - name: Upload frontend artifacts
        uses: actions/upload-artifact@v4
        with:
          name: frontend-dist
          path: frontend/dist/

  # Home Assistant Add-on build (amd64 only for now)
  hassio-addon:
    needs: frontend
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download frontend artifacts
        uses: actions/download-artifact@v4
        with:
          name: frontend-dist
          path: frontend/dist/

      - name: Prepare add-on build context
        run: mkdir -p hassio/frontend && cp -r frontend/dist hassio/frontend/

      - name: Copy add-on configuration files
        run: cp hassio/config.json . && cp hassio/build.json .

      - name: Log in to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build Home Assistant Add-on (amd64)
        uses: home-assistant/builder@master
        with:
          working-directory: hassio
          args: |
            --amd64
            --target hassio
